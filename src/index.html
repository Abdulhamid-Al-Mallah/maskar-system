<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MASKAR Perfumes Manager</title>
  <link rel="stylesheet" href="index.css">
  <script>
    (function() {
      const theme = localStorage.getItem('theme') || 'dark';
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
</head>
<body>
  <!-- Custom Titlebar -->
  <div class="titlebar">
    <div class="titlebar-brand">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
      MASKAR PERFUMES
    </div>
    <div class="titlebar-controls">
      <button class="titlebar-btn" id="btnThemeToggle" title="Toggle Theme" style="-webkit-app-region: no-drag;"></button>
      <button class="titlebar-btn" id="btnMin" title="Minimize"><svg width="12" height="12" viewBox="0 0 12 12"><line x1="1" y1="6" x2="11" y2="6" stroke="currentColor" stroke-width="1.5"/></svg></button>
      <button class="titlebar-btn" id="btnMax" title="Maximize"><svg width="12" height="12" viewBox="0 0 12 12"><rect x="1.5" y="1.5" width="9" height="9" rx="1" stroke="currentColor" stroke-width="1.5" fill="none"/></svg></button>
      <button class="titlebar-btn close" id="btnClose" title="Close"><svg width="12" height="12" viewBox="0 0 12 12"><line x1="2" y1="2" x2="10" y2="10" stroke="currentColor" stroke-width="1.5"/><line x1="10" y1="2" x2="2" y2="10" stroke="currentColor" stroke-width="1.5"/></svg></button>
    </div>
  </div>

  <!-- App Layout -->
  <div class="app-layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header"><h2 id="sidebarTitle">NAVIGATION</h2></div>
      <nav class="sidebar-nav" id="sidebarNav"></nav>
    </aside>

    <!-- Main Content -->
    <main class="main-content" id="mainContent"></main>
  </div>
  
  <!-- Auth & Setup Overlay -->
  <div class="auth-overlay" id="authOverlay">
    <!-- Setup Screen -->
    <div class="auth-card" id="setupCard" style="display: none;">
      <div class="auth-logo">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
        <h1>DATABASE SETUP</h1>
        <p>Connect the manager to your MongoDB Database</p>
      </div>
      <form id="setupForm" class="auth-form">
        <div class="form-group">
          <label for="setupUri">MongoDB Connection URI</label>
          <input type="text" id="setupUri" placeholder="mongodb+srv://username:password@cluster.mongodb.net/maskar" required autocomplete="off">
          <span class="text-muted" style="font-size: 0.75rem; margin-top: 4px; display: block;">
            Make sure to include a database name at the end (e.g. <code>.../maskar</code>).
          </span>
        </div>
        <div class="form-group">
          <label for="setupAdminUser">Admin Username</label>
          <input type="text" id="setupAdminUser" placeholder="admin" value="admin" required>
        </div>
        <div class="form-group">
          <label for="setupAdminPass">Admin Password</label>
          <input type="password" id="setupAdminPass" placeholder="Create a secure password" required>
        </div>
        <button type="submit" class="btn btn-gold" id="btnConnect" style="width: 100%; margin-top: 10px;">
          <span id="btnConnectText">Save & Connect</span>
        </button>
      </form>
    </div>

    <!-- Login Screen -->
    <div class="auth-card" id="loginCard" style="display: none;">
      <div class="auth-logo">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
        <h1>SYSTEM LOGIN</h1>
        <p>Enter your credentials to access the manager</p>
      </div>
      <form id="loginForm" class="auth-form">
        <div class="form-group">
          <label for="loginUser">Username</label>
          <input type="text" id="loginUser" required autocomplete="username">
        </div>
        <div class="form-group">
          <label for="loginPass">Password</label>
          <input type="password" id="loginPass" required autocomplete="current-password">
        </div>
        <div class="flex-between" style="width: 100%; margin-top: 12px; margin-bottom: 8px;">
          <button type="button" class="btn-link" id="btnResetConnection" style="background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 0.8rem; text-decoration: underline;">Reset Database Connection</button>
        </div>
        <button type="submit" class="btn btn-gold" id="btnLogin" style="width: 100%; margin-top: 6px;">
          <span id="btnLoginText">Sign In</span>
        </button>
      </form>
    </div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- Modal Container -->
  <div id="modalContainer"></div>

  <script src="core.js"></script>
  <script src="renderer.js"></script>
  <script src="pg-dashboard.js"></script>
  <script src="pg-products.js"></script>
  <script src="pg-inventory.js"></script>
  <script src="pg-orders.js"></script>
  <script src="pg-customers.js"></script>
  <script src="pg-accounting.js"></script>
  <script src="pg-calculator.js"></script>
  <script src="pg-settings.js"></script>
</body>
</html>
